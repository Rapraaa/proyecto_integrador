name: Deploy NestJS Entrevistas Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_KEY }}
          source: "."
          target: "/var/www/proyecto_integrador"

      - name: Run deploy commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e
            cd /var/www/proyecto_integrador/simulador_entrevistas

            sudo lsof -t -i:3000 | xargs -r sudo kill -9 || true

            printf "%s" "${{ secrets.ENV_FILE }}" > .env

            npm install
            npm run build

            pm2 stop entrevistas_backend || true
            pm2 delete entrevistas_backend || true
            pm2 start dist/main.js --name entrevistas_backend
            pm2 save
